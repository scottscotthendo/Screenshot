appId: com.mcSnapface.app
productName: McSnapface
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - '!**/*.{ts,map}'
mac:
  category: public.app-category.utilities
  target:
    - dmg
    - zip
  icon: resources/icon.icns
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: "McSnapface needs mic access to record audio with your screen recordings."
    NSCameraUsageDescription: "McSnapface needs camera access for webcam overlay during recordings."
    NSScreenCaptureUsageDescription: "McSnapface needs screen capture access to take screenshots and record your screen."
dmg:
  artifactName: McSnapface-${version}.${ext}
